services:
  - type: web
    name: roomsync-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:8000"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_NAME
        fromDatabase:
          name: roomsync-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: roomsync-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: roomsync-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: roomsync-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: roomsync-db
          property: port

databases:
  - name: roomsync-db
    plan: free